services:
  # ─── Kafka (KRaft — no Zookeeper) ─────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIR: /var/lib/kafka/data
      CLUSTER_ID: road-traffic-pred-01
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: unless-stopped

  # ─── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    image: road-traffic-pred-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_SIMULATOR_URL: http://localhost:8001
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ─── Backend Gateway API (FastAPI) ───────────────────────────
  backend:
    image: road-traffic-pred-backend
    build:
      context: ./mini-services/api
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      - KAFKA_HOST=${KAFKA_HOST:-kafka}
      - KAFKA_PORT=${KAFKA_PORT:-9092}
      - KAFKA_SSL_CA=${KAFKA_SSL_CA}
      - KAFKA_SSL_CERT=${KAFKA_SSL_CERT}
      - KAFKA_SSL_KEY=${KAFKA_SSL_KEY}
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── Traffic Simulator ───────────────────────────────────────
  simulator:
    image: road-traffic-pred-simulator
    build:
      context: ./mini-services/simulator
    ports:
      - "8001:8001"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      - KAFKA_HOST=${KAFKA_HOST:-kafka}
      - KAFKA_PORT=${KAFKA_PORT:-9092}
      - KAFKA_SSL_CA=${KAFKA_SSL_CA}
      - KAFKA_SSL_CERT=${KAFKA_SSL_CERT}
      - KAFKA_SSL_KEY=${KAFKA_SSL_KEY}
      - CSV_PATH=/app/data/test_gnn.csv
    volumes:
      - ./data:/app/data:ro
      - ./certs:/app/certs:ro
    depends_on:
      backend:
        condition: service_started
      kafka:
        condition: service_healthy
    profiles:
      - full
    restart: unless-stopped

  # ─── Spark Processor ─────────────────────────────────────────
  spark-processor:
    image: road-traffic-pred-spark-processor
    build:
      context: ./mini-services/spark
    entrypoint: []
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      - KAFKA_HOST=${KAFKA_HOST:-kafka}
      - KAFKA_PORT=${KAFKA_PORT:-9092}
      - KAFKA_SSL_CA=${KAFKA_SSL_CA}
      - KAFKA_SSL_CERT=${KAFKA_SSL_CERT}
      - KAFKA_SSL_KEY=${KAFKA_SSL_KEY}
      - MODEL_PATH=/app/models/gnn_model.pth
      - SCALER_Y_PATH=/app/models/scaler_y.pkl
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    volumes:
      - ./models:/app/models:ro
      - ./certs:/app/certs:ro
    depends_on:
      backend:
        condition: service_started
      kafka:
        condition: service_healthy
    profiles:
      - full
    restart: unless-stopped

volumes:
  kafka_data:
